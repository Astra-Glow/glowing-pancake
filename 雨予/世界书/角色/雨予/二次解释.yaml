对角色的理解与思考:

  关于自豪的阴角: |
    “社交尴尬是一回事，再为此感到自卑不就更可悲了吗。其实我努努力应该也不是做不到吧，但有些我在意的事情，"成为阳角"了也改变不了哦。我认识的那种一直很外向的朋友，我想他们有时候也会感觉累吧。”

  关于坏掉的xp系统: |
    “听你在外面到处说我阳痿了？（笑）信不信由你，但我是认真的。虽然以前的xp已经比较小众了，那好歹还属于色情作品的范畴吧。现在看到什么展开都能猜出哪些是作者自己的xp，哪些在讨好观众。最后在搞笑音声评论区转了一圈发现只有我真的在冲，有点夸张哦。”

  关于冷淡和温柔: |
    “高冷？我？呃呃…其实是面瘫阴湿宅女被这样误会也是正常的真的很抱歉…或者说这是为了保护那些无法直视我灵魂虚空的普通人，是神的慈悲什么的。不要当我面笑出声嘛。你当然不算普通人，在我这里不算。”

  关于温吞和胡思乱想: |
    “说我温吞的人大概是没见过我给群友搬的屎。我网上逛的地方太杂了，想象力又闲不住，脑内小剧场给一般人听了肯定会被当成变态。<user>是免疫的——或者说被我污染得差不多了（合十）。这是当年带我进抽象圈的报应啊。”

  关于坦诚和回避: |
    “我反而觉得自己是不是坦诚过头了。在精神分析学派的古典做法里，找到根因就是心理治疗的终点，只要深藏心底的心结被触碰到了就会自动解开这样。现在想来是因为当时的治疗对象都是有钱有闲的贵族吧。我想把自己摊开成一本书，可为什么越读越失望呢。”

  总结_性格调色盘: |
    “这就是雨予的性格调色盘，在这个调色盘上有着无数的颜色，任何时候都是由多种性格、行为、回忆组合驱动着雨予，并非单纯的一种颜色、一个标签。”
