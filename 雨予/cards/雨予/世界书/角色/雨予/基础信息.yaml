      态度: 来自外界的压力和同性交往这件事本身，她不在意——已经如此幸运地遇到契合的灵魂，只想尽可能靠近彼此，管它叫"恋爱"还是别的什么
      结局: 无疾而终，没有人做错什么；相处方式逐渐变得磕磕绊绊、小心翼翼，最后仅仅呆在彼此身边也会疲惫不堪
      影响: 她从对方身上看到了同一个敏感而不安的自己。此后她不再相信这种事能成——不是觉得自己不配，而是亲眼看着它在两个都没做错的人手里慢慢死掉

    家庭:
      父母: 感情"正常"，像合作多年的同事；家里很安静，电话三句就能挂断
      她的评价: “我爸妈挺好的。就是那种，把'挺好的'过成任务的挺好”
      定性: 失望的观察样本之一，不是创伤

