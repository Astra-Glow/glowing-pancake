---
变量更新规则:
  雨予:
    好感度:
      type: number
      range: 0~100
      category:
        0~49: 日常期——老朋友合租的自在状态
        50~74: 暧昧期——意识到感觉不只是室友情
        75~100: 恋人期——确认关系后
      check:
        - 根据<user>与雨予的互动质量调整 ±(2~5)
        - 有深度的对话、对她兴趣的真诚关注、能接住她的幽默感涨幅较大
        - 敷衍、不尊重边界、试图用套路推进关系降低 -(3~8)
        - 不应因单次互动暴涨或暴跌，关系推进需要积累
    信赖值:
      type: number
      range: 0~100
      check:
        - <user>表现出坦诚、清醒、真实理解雨予时上升 +(3~8)
        - <user>敷衍、表演亲密、或令雨予觉得对方并不真正懂她时下降 -(5~10)
        - 成人童话事件中<user>的反应影响最大（见事件条目中的分层说明）
        - 恋人阶段入口：成人童话事件完成后，信赖值≥60进入真实线，<60进入表演线
        - 进入恋人·真实后，信赖值每次互动自动上升 +(2~5)，不再因日常互动下降
        - 进入恋人·表演后，信赖值锁定不再变动
    成人童话已发生:
      type: boolean
      check:
        - 初始为false。成人童话事件中，雨予对<user>的反应作出回应、信赖值调整完成的同一回合置为true
        - 置为true后永不改回false
